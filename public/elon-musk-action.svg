<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Tesla / xAI / SpaceX referenced editorial collage">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="orb" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.25)"/>
      <stop offset="60%" stop-color="rgba(201,168,76,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="car" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="skin2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d4b8"/>
      <stop offset="100%" stop-color="#9a7a5a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg2)"/>
  <ellipse cx="160" cy="180" rx="240" ry="220" fill="url(#orb)"/>

  <!-- Stars -->
  <g fill="rgba(255,255,255,0.6)">
    <circle cx="640" cy="60" r="1"/>
    <circle cx="720" cy="120" r="1.2"/>
    <circle cx="580" cy="40" r="0.8"/>
    <circle cx="660" cy="180" r="1"/>
    <circle cx="500" cy="80" r="0.9"/>
    <circle cx="750" cy="220" r="1.3"/>
    <circle cx="690" cy="260" r="0.7"/>
    <circle cx="620" cy="320" r="1"/>
  </g>

  <!-- Rocket trail -->
  <g transform="translate(640,200)">
    <path d="M 0 0 L 40 -80 L 50 -80 L 10 0 Z" fill="rgba(201,168,76,0.4)"/>
    <path d="M -8 8 L -50 90 L -30 90 L 2 18 Z" fill="rgba(201,168,76,0.25)"/>
    <ellipse cx="0" cy="0" rx="14" ry="34" fill="#dcdcdc"/>
    <path d="M -14 0 L -14 25 L -22 35 L -22 40 L 22 40 L 22 35 L 14 25 L 14 0 Z" fill="#888"/>
    <polygon points="0,-34 7,-44 -7,-44" fill="#c9a84c"/>
    <circle cx="0" cy="-10" r="3" fill="rgba(50,100,200,0.7)"/>
  </g>

  <!-- Earth curvature -->
  <path d="M 0 380 Q 400 320 800 380 L 800 450 L 0 450 Z" fill="#0a1525" opacity="0.8"/>

  <!-- Tesla car silhouette -->
  <g transform="translate(120,330)">
    <path d="M 0 30 L 30 0 L 130 0 L 170 -20 L 240 -20 L 280 0 L 320 0 L 350 30 L 350 50 L 0 50 Z" fill="url(#car)"/>
    <ellipse cx="60" cy="50" rx="30" ry="14" fill="#1a1a1a"/>
    <ellipse cx="290" cy="50" rx="30" ry="14" fill="#1a1a1a"/>
    <ellipse cx="60" cy="50" rx="14" ry="7" fill="#444"/>
    <ellipse cx="290" cy="50" rx="14" ry="7" fill="#444"/>
    <rect x="40" y="0" width="270" height="2" fill="#c9a84c" opacity="0.5"/>
  </g>

  <!-- Stylised figure silhouette on left -->
  <g transform="translate(120,180)">
    <ellipse cx="0" cy="-40" rx="42" ry="50" fill="url(#skin2)"/>
    <path d="M -42 -65 Q -45 -90 0 -95 Q 45 -90 42 -65 Q 35 -78 0 -82 Q -35 -78 -42 -65 Z" fill="#3d2817"/>
    <path d="M -50 80 L -35 0 Q -20 -20 0 -20 Q 20 -20 35 0 L 50 80 Z" fill="#1a1f2e"/>
    <rect x="-18" y="-12" width="36" height="60" fill="#f0ece2" opacity="0.3"/>
    <polygon points="-10,-12 0,30 10,-12" fill="#c9a84c" opacity="0.8"/>
  </g>

  <!-- Editorial label -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="3" height="50" fill="#c9a84c"/>
    <text x="12" y="18" font-family="Georgia, serif" font-size="14" fill="#c9a84c" letter-spacing="4" font-weight="bold">THE MUSK PORTFOLIO</text>
    <text x="12" y="36" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.55)" letter-spacing="1.5">TESLA · xAI · SPACEX · NEURALINK · THE BORING COMPANY</text>
  </g>

  <!-- Bottom tagline -->
  <g transform="translate(40,410)">
    <text font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.5)" font-style="italic">
      "We need to take risks on things that matter."
    </text>
  </g>

  <!-- xAI mark -->
  <g transform="translate(700,400)">
    <text font-family="Helvetica, Arial, sans-serif" font-size="9" fill="rgba(201,168,76,0.7)" letter-spacing="3">xAI · INDEX</text>
  </g>
</svg>
