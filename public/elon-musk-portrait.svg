<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stylised editorial portrait reference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="60%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(201,168,76,0.18)"/>
      <stop offset="60%" stop-color="rgba(201,168,76,0.05)"/>
      <stop offset="100%" stop-color="rgba(201,168,76,0)"/>
    </radialGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d4b8"/>
      <stop offset="100%" stop-color="#b89a7a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <circle cx="200" cy="175" r="220" fill="url(#halo)"/>

  <!-- Grid lines for editorial feel -->
  <g stroke="rgba(201,168,76,0.05)" stroke-width="1">
    <line x1="0" y1="125" x2="400" y2="125"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="375" x2="400" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
  </g>

  <!-- Suit shoulders/torso -->
  <path d="M 70 500 L 90 380 Q 140 340 200 340 Q 260 340 310 380 L 330 500 Z" fill="url(#suit)"/>
  <!-- Lapel -->
  <path d="M 170 360 L 200 410 L 230 360 L 220 500 L 180 500 Z" fill="#0a0f1e" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>
  <!-- Shirt collar -->
  <path d="M 185 350 L 200 405 L 215 350 Z" fill="#f0ece2"/>
  <!-- Tie -->
  <path d="M 195 360 L 205 360 L 207 500 L 193 500 Z" fill="#c9a84c" opacity="0.85"/>

  <!-- Neck -->
  <rect x="180" y="290" width="40" height="60" rx="6" fill="url(#skin)"/>

  <!-- Head silhouette -->
  <ellipse cx="200" cy="220" rx="78" ry="92" fill="url(#skin)"/>

  <!-- Hair -->
  <path d="M 125 175 Q 130 130 200 122 Q 270 130 275 175 Q 268 145 200 142 Q 132 148 125 175 Z" fill="#3d2817"/>
  <path d="M 142 168 Q 175 145 200 145 Q 225 145 258 168 Q 230 158 200 158 Q 170 158 142 168 Z" fill="#2a1a0e"/>

  <!-- Subtle facial structure lines -->
  <ellipse cx="172" cy="210" rx="6" ry="3" fill="#2a1a0e" opacity="0.7"/>
  <ellipse cx="228" cy="210" rx="6" ry="3" fill="#2a1a0e" opacity="0.7"/>
  <path d="M 195 240 Q 200 250 205 240" stroke="#8a6a4a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 188 268 Q 200 274 212 268" stroke="#6b4a2e" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Editorial caption block -->
  <rect x="40" y="440" width="3" height="40" fill="#c9a84c"/>
  <text x="52" y="460" font-family="Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="3" font-weight="bold">PORTFOLIO REFERENCE</text>
  <text x="52" y="475" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">AI · ELECTRIC MOBILITY · ORBITAL</text>
</svg>
